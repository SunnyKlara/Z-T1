name: zcritical
description: "ZCritical - 桌面风洞模型智能控制终端"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: 2.6.1

  # 路由
  go_router: 14.8.1

  # 依赖注入
  get_it: 8.0.3

  # 日志
  logger: 2.5.0

  # 本地存储
  shared_preferences: 2.3.4

  # BLE
  flutter_blue_plus: 1.35.2

  # 图片处理
  image: 4.5.2

  # 国际化
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # UI
  cupertino_icons: 1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 测试
  mocktail: 1.0.4

  # Lint
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  generate: true
